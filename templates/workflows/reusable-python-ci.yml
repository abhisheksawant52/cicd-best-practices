# Hardened, reusable Python CI workflow.
# Call it from another repo with:
#
#   jobs:
#     ci:
#       uses: abhisheksawant52/cicd-best-practices/.github/workflows/reusable-python-ci.yml@main
#       with:
#         python-version: "3.12"
name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to use
        type: string
        default: "3.12"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: pytest
